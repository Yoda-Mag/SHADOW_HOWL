name: Shadow Howl Backend CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- BACKEND CI JOB ---
  backend-ci:
    name: Backend Build & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Latest 2026 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install Dependencies
        working-directory: ./Backend
        run: npm ci

      - name: Run Linter (ESLint)
        working-directory: ./Backend
        run: npx eslint . --max-warnings 0

      - name: Syntax Check
        working-directory: ./Backend
        run: node --check index.js

      - name: Check API Routes Configuration
        working-directory: ./Backend
        run: |
          cat > test-routes.js << 'EOF'
          console.log('Checking API routes...');
          const routes = [
            './Routes/AuthRoutes',
            './Routes/SignalRoutes',
            './Routes/UserRoutes',
            './Routes/ChatRoutes',
            './Routes/adminRoutes'
          ];
          
          let missing = [];
          routes.forEach(route => {
            try {
              require(route);
              console.log(`✓ ${route} loaded`);
            } catch(e) {
              missing.push(route);
              console.error(`❌ ${route} NOT FOUND`);
            }
          });
          
          if (missing.length > 0) {
            console.error(`Missing ${missing.length} routes`);
            process.exit(1);
          }
          console.log('✓ All routes configured');
          process.exit(0);
          EOF
          node test-routes.js
