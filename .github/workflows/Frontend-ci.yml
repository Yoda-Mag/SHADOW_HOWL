name: Shadow Howl Frontend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'Frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Frontend/**'

jobs:
  frontend-build:
    name: Frontend Build & Sanity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./Frontend
        run: npm ci 

      - name: Lint Check
        working-directory: ./Frontend
        run: npm run lint

      - name: Check API Configuration
        working-directory: ./Frontend
        run: |
          echo "Checking API configuration..."
          
          if [ -z "${{ secrets.VITE_API_URL }}" ]; then
            echo "⚠️  VITE_API_URL not set in GitHub Secrets"
            echo "    Frontend will use default: /api (same-origin proxy)"
          else
            echo "✓ VITE_API_URL configured: ${{ secrets.VITE_API_URL }}"
          fi

      - name: Build Project (Vite)
        working-directory: ./Frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || '/api' }}
          CI: true

      - name: Verify Build Output
        working-directory: ./Frontend
        run: |
          echo "Verifying build output..."
          
          if [ ! -f "dist/index.html" ]; then
            echo "❌ ERROR: dist/index.html not found"
            exit 1
          fi
          
          echo "✓ Build output verified"
          echo "  Files:"
          ls -lah dist/ | head -20

      - name: Upload Production Build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-files
          path: Frontend/dist/
          retention-days: 7
